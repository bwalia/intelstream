name: CI

on:
  push:
    branches: [main, develop]
  pull_request:
    branches: [main, develop]

env:
  CARGO_TERM_COLOR: always
  RUSTFLAGS: "-D warnings"
  RUST_BACKTRACE: 1

jobs:
  # ============================================================================
  # Lint & Format
  # ============================================================================
  lint:
    name: Lint & Format
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@stable
        with:
          components: rustfmt, clippy

      - name: Cache cargo registry & build
        uses: actions/cache@v4
        with:
          path: |
            ~/.cargo/registry
            ~/.cargo/git
            target
          key: ${{ runner.os }}-cargo-lint-${{ hashFiles('**/Cargo.lock') }}
          restore-keys: ${{ runner.os }}-cargo-lint-

      - name: Install protoc
        uses: arduino/setup-protoc@v3
        with:
          version: "25.x"

      - name: Check formatting
        run: cargo fmt --all -- --check

      - name: Run clippy
        run: cargo clippy --all-targets --all-features -- -D warnings

  # ============================================================================
  # Unit Tests
  # ============================================================================
  unit-tests:
    name: Unit Tests
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        crate:
          - intelstream-core
          - intelstream-api
          - intelstream-client
          - intelstream-mcp
          - intelstream-stream
          - intelstream-schema
          - intelstream-connector
          - intelstream-auth
    steps:
      - uses: actions/checkout@v4

      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@stable

      - name: Cache cargo registry & build
        uses: actions/cache@v4
        with:
          path: |
            ~/.cargo/registry
            ~/.cargo/git
            target
          key: ${{ runner.os }}-cargo-test-${{ matrix.crate }}-${{ hashFiles('**/Cargo.lock') }}
          restore-keys: |
            ${{ runner.os }}-cargo-test-${{ matrix.crate }}-
            ${{ runner.os }}-cargo-test-

      - name: Install protoc
        uses: arduino/setup-protoc@v3
        with:
          version: "25.x"

      - name: Run unit tests for ${{ matrix.crate }}
        run: cargo test -p ${{ matrix.crate }} --lib --verbose
        env:
          SKIP_PROTO_BUILD: "1"

      - name: Run doc tests for ${{ matrix.crate }}
        run: cargo test -p ${{ matrix.crate }} --doc --verbose
        env:
          SKIP_PROTO_BUILD: "1"

  # ============================================================================
  # Integration Tests (workspace-level)
  # ============================================================================
  integration-tests:
    name: Integration Tests
    runs-on: ubuntu-latest
    needs: unit-tests
    steps:
      - uses: actions/checkout@v4

      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@stable

      - name: Cache cargo registry & build
        uses: actions/cache@v4
        with:
          path: |
            ~/.cargo/registry
            ~/.cargo/git
            target
          key: ${{ runner.os }}-cargo-integration-${{ hashFiles('**/Cargo.lock') }}
          restore-keys: ${{ runner.os }}-cargo-integration-

      - name: Install protoc
        uses: arduino/setup-protoc@v3
        with:
          version: "25.x"

      - name: Run integration tests
        run: cargo test --test '*' --verbose
        env:
          SKIP_PROTO_BUILD: "1"

  # ============================================================================
  # Build Binaries
  # ============================================================================
  build:
    name: Build
    runs-on: ubuntu-latest
    needs: [lint, unit-tests]
    steps:
      - uses: actions/checkout@v4

      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@stable

      - name: Cache cargo registry & build
        uses: actions/cache@v4
        with:
          path: |
            ~/.cargo/registry
            ~/.cargo/git
            target
          key: ${{ runner.os }}-cargo-build-${{ hashFiles('**/Cargo.lock') }}
          restore-keys: ${{ runner.os }}-cargo-build-

      - name: Install protoc
        uses: arduino/setup-protoc@v3
        with:
          version: "25.x"

      - name: Build all binaries (release)
        run: cargo build --release --all

      - name: Upload server binary
        uses: actions/upload-artifact@v4
        with:
          name: intelstream-server
          path: target/release/intelstream
          retention-days: 7

      - name: Upload CLI binary
        uses: actions/upload-artifact@v4
        with:
          name: intelstream-cli
          path: target/release/isctl
          retention-days: 7

  # ============================================================================
  # Docker Build & Smoke Tests
  # ============================================================================
  smoke-tests:
    name: Docker Smoke Tests
    runs-on: ubuntu-latest
    needs: build
    steps:
      - uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Build Docker image
        uses: docker/build-push-action@v5
        with:
          context: .
          file: docker/Dockerfile
          push: false
          load: true
          tags: intelstream:test
          cache-from: type=gha
          cache-to: type=gha,mode=max

      - name: Start cluster with docker compose
        run: |
          cd docker
          docker compose up -d --build --wait --wait-timeout 120
        timeout-minutes: 5

      - name: Wait for brokers to be healthy
        run: |
          echo "Waiting for broker-1 health endpoint..."
          for i in $(seq 1 30); do
            if curl -sf http://localhost:8080/api/v1/health > /dev/null 2>&1; then
              echo "Broker-1 is healthy!"
              break
            fi
            echo "Attempt $i/30 - waiting 5s..."
            sleep 5
          done
          # Final check — fail if not healthy
          curl -sf http://localhost:8080/api/v1/health || (echo "Broker-1 failed health check" && exit 1)

      - name: Run smoke tests
        run: |
          chmod +x tests/smoke_test.sh
          ./tests/smoke_test.sh
        timeout-minutes: 5

      - name: Collect docker logs on failure
        if: failure()
        run: |
          cd docker
          docker compose logs --tail=200 > /tmp/docker-logs.txt 2>&1
          cat /tmp/docker-logs.txt

      - name: Upload docker logs on failure
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: docker-logs
          path: /tmp/docker-logs.txt
          retention-days: 3

      - name: Tear down cluster
        if: always()
        run: |
          cd docker
          docker compose down -v --remove-orphans

  # ============================================================================
  # Benchmarks (non-blocking, for tracking)
  # ============================================================================
  benchmarks:
    name: Benchmarks
    runs-on: ubuntu-latest
    needs: unit-tests
    if: github.ref == 'refs/heads/main'
    steps:
      - uses: actions/checkout@v4

      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@stable

      - name: Cache cargo registry & build
        uses: actions/cache@v4
        with:
          path: |
            ~/.cargo/registry
            ~/.cargo/git
            target
          key: ${{ runner.os }}-cargo-bench-${{ hashFiles('**/Cargo.lock') }}
          restore-keys: ${{ runner.os }}-cargo-bench-

      - name: Install protoc
        uses: arduino/setup-protoc@v3
        with:
          version: "25.x"

      - name: Run benchmarks
        run: cargo bench --bench throughput -- --output-format bencher | tee /tmp/bench-results.txt
        env:
          SKIP_PROTO_BUILD: "1"

      - name: Upload benchmark results
        uses: actions/upload-artifact@v4
        with:
          name: benchmark-results
          path: /tmp/bench-results.txt
          retention-days: 30
