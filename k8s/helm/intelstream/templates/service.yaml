apiVersion: v1
kind: Service
metadata:
  name: {{ include "intelstream.fullname" . }}
  labels:
    app.kubernetes.io/name: intelstream
    app.kubernetes.io/instance: {{ .Release.Name }}
spec:
  type: ClusterIP
  ports:
    - name: broker
      port: {{ .Values.broker.port }}
      targetPort: broker
    - name: rest
      port: {{ .Values.api.restPort }}
      targetPort: rest
    - name: grpc
      port: {{ .Values.api.grpcPort }}
      targetPort: grpc
    - name: metrics
      port: {{ .Values.metrics.prometheusPort }}
      targetPort: metrics
  selector:
    app.kubernetes.io/name: intelstream
    app.kubernetes.io/instance: {{ .Release.Name }}
---
# Headless service for StatefulSet DNS
apiVersion: v1
kind: Service
metadata:
  name: {{ include "intelstream.fullname" . }}-headless
  labels:
    app.kubernetes.io/name: intelstream
    app.kubernetes.io/instance: {{ .Release.Name }}
spec:
  type: ClusterIP
  clusterIP: None
  ports:
    - name: broker
      port: {{ .Values.broker.port }}
      targetPort: broker
  selector:
    app.kubernetes.io/name: intelstream
    app.kubernetes.io/instance: {{ .Release.Name }}
