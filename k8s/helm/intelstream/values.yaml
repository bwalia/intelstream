# IntelStream Helm Chart Values

replicaCount: 3

image:
  repository: intelstream/intelstream
  tag: "0.1.0"
  pullPolicy: IfNotPresent

nameOverride: ""
fullnameOverride: ""

broker:
  port: 9292
  dataDir: /data
  segmentSizeBytes: 1073741824
  maxMessageSizeBytes: 10485760
  replication:
    factor: 3
    minInSyncReplicas: 2
  retention:
    hours: 168
    compactionEnabled: false
  performance:
    ioThreads: 4
    networkThreads: 4
    compression: zstd

api:
  restPort: 8080
  grpcPort: 9090
  enableSwagger: true

schemaRegistry:
  enabled: true
  port: 8081
  compatibility: backward

mcp:
  enabled: true
  port: 8090
  anomalyDetection: true
  autoScaling: false

auth:
  enabled: false
  provider: jwt

tls:
  enabled: false
  certSecret: ""

metrics:
  enabled: true
  prometheusPort: 9191

persistence:
  enabled: true
  storageClass: ""
  size: 100Gi
  accessModes:
    - ReadWriteOnce

resources:
  requests:
    cpu: "500m"
    memory: "1Gi"
  limits:
    cpu: "2"
    memory: "4Gi"

nodeSelector: {}
tolerations: []
affinity:
  podAntiAffinity:
    preferredDuringSchedulingIgnoredDuringExecution:
      - weight: 100
        podAffinityTerm:
          labelSelector:
            matchExpressions:
              - key: app.kubernetes.io/name
                operator: In
                values:
                  - intelstream
          topologyKey: kubernetes.io/hostname

serviceAccount:
  create: true
  name: ""
  annotations: {}
